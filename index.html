<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Khatak Robot Control</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Robot">

  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f0f4f8; margin: 0; padding: 20px; }
    .card { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .status-bar { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; padding: 12px; border-radius: 12px; font-weight: bold; transition: 0.3s; }
    .online { background: #dcfce7; color: #166534; }
    .offline { background: #fee2e2; color: #991b1b; }
    .listening { background: #fef3c7; color: #92400e; border: 2px solid #fbbf24; }
    .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-left: 10px; }
    input { padding: 12px; width: 85%; margin: 15px 0; border: 1px solid #cbd5e1; border-radius: 10px; text-align: center; font-size: 16px; }
    button { padding: 15px 25px; width: 90%; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.2s; }
    .btn-start { background: #2563eb; color: white; margin-bottom: 10px; }
    .btn-start:active { transform: scale(0.98); background: #1d4ed8; }
    .log-box { background: #f8fafc; padding: 15px; margin-top: 15px; border-radius: 10px; border: 1px solid #e2e8f0; min-height: 50px; }
    .small-hint { font-size: 12px; color: #64748b; margin-top: 10px; }
  </style>
</head>
<body>

<div class="card">
  <div id="connectionStatus" class="status-bar offline">
    <span id="statusLabel">جاري التحقق من الشبكة...</span>
    <span id="statusDot" class="dot" style="background: #ef4444;"></span>
  </div>

  <h2>لوحة تحكم btetah</h2>
  <input type="text" id="espIp" placeholder="IP أو robot.local" value="robot.local">
  
  <button class="btn-start" onclick="startListening()">🎤 ابدأ الاستماع</button>
  
  <div class="log-box" id="recognizedText">تحدث ليتم تحويل صوتك لنص...</div>
  <div class="log-box" id="debugLog" style="font-size: 12px; color: #71717a;">سجل العمليات جاهز</div>
  
  <p class="small-hint">قل "شغل" أو "طفي" للتحكم باللد</p>
</div>

<script>
  const statusLabel = document.getElementById("statusLabel");
  const statusDot = document.getElementById("statusDot");
  const connectionStatus = document.getElementById("connectionStatus");
  const debugLog = document.getElementById("debugLog");
  const espIpInput = document.getElementById("espIp");

  let isMicActive = false;

  // 1. فحص الاتصال التلقائي
  async function checkESP() {
    if (isMicActive) return; // توقف عن الفحص إذا المايك شغال لمنع التضارب
    
    const ip = espIpInput.value;
    try {
      const controller = new AbortController();
      setTimeout(() => controller.abort(), 3000); 
      const response = await fetch(`http://${ip}/status`, { signal: controller.signal });
      if (response.ok) {
        statusLabel.innerText = "متصل بالروبوت";
        statusDot.style.background = "#22c55e";
        connectionStatus.className = "status-bar online";
      }
    } catch (err) {
      statusLabel.innerText = "غير متصل (تأكد من الشبكة)";
      statusDot.style.background = "#ef4444";
      connectionStatus.className = "status-bar offline";
    }
  }
  setInterval(checkESP, 5000);

  // 2. إعداد الميكروفون
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = "ar-IQ"; // لغة عراقية
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onstart = () => {
      isMicActive = true;
      connectionStatus.className = "status-bar listening";
      statusLabel.innerText = "أسمعك الآن...";
      statusDot.style.background = "#fbbf24";
      debugLog.innerText = "الميكروفون نشط";
    };

    recognition.onresult = (event) => {
      const text = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();
      document.getElementById("recognizedText").innerText = "سمعتك تقول: " + text;
      
      if (text.includes("شغل") || text.includes("on")) sendCommand("on");
      if (text.includes("طفي") || text.includes("off")) sendCommand("off");
    };

    recognition.onerror = (e) => {
      debugLog.innerText = "خطأ: " + e.error;
      isMicActive = false;
    };

    recognition.onend = () => {
      isMicActive = false;
      debugLog.innerText = "توقف الميكروفون";
    };
  }

  function startListening() {
    if (!SpeechRecognition) {
      alert("متصفحك لا يدعم التعرف على الصوت");
      return;
    }
    recognition.start();
  }

  // 3. إرسال الأوامر
  async function sendCommand(cmd) {
    const ip = espIpInput.value;
    try {
      const response = await fetch(`http://${ip}/${cmd}`);
      const data = await response.text();
      debugLog.innerText = "تم التنفيذ: " + data;
    } catch (err) {
      debugLog.innerText = "فشل الاتصال بـ " + ip;
    }
  }
</script>
</body>
</html>

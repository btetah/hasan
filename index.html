<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice Control - Debug Mode</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
    .card { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    /* ستايل إشارة الاتصال */
    .status-bar { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; padding: 10px; border-radius: 8px; font-weight: bold; }
    .online { background: #dcfce7; color: #166534; }
    .offline { background: #fee2e2; color: #991b1b; }
    .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    
    button { padding: 12px 20px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 80%; }
    .btn-start { background: #2563eb; color: white; }
    input { padding: 10px; width: 80%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
    .log { background: #f8fafc; padding: 10px; margin-top: 10px; border-radius: 5px; font-size: 13px; border: 1px solid #e2e8f0; }
  </style>
</head>
<body>

<div class="card">
  <div id="connectionStatus" class="status-bar offline">
    <span id="statusDot" class="dot" style="background: #ef4444;"></span>
    <span id="statusLabel">جاري فحص الاتصال بالـ ESP...</span>
  </div>

  <h3>تحكم الروبوت بالصوت</h3>
  <input type="text" id="espIp" placeholder="IP أو robot.local" value="robot.local">
  
  <button class="btn-start" onclick="startListening()">ابدأ الاستماع للآوامر</button>
  
  <div class="log" id="recognizedText">الكلام المكتشف يظهر هنا</div>
  <div class="log" id="debugLog" style="color: #64748b;">سجل العمليات...</div>
</div>

<script>
  const statusLabel = document.getElementById("statusLabel");
  const statusDot = document.getElementById("statusDot");
  const connectionStatus = document.getElementById("connectionStatus");
  const debugLog = document.getElementById("debugLog");
  const espIpInput = document.getElementById("espIp");

  // دالة فحص الاتصال التلقائي كل 3 ثواني
  async function checkESP() {
    const ip = espIpInput.value;
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 2000); // وقت انتظار 2 ثانية

      const response = await fetch(`http://${ip}/status`, { signal: controller.signal });
      if (response.ok) {
        statusLabel.innerText = "متصل بالـ ESP32";
        statusDot.style.background = "#22c55e";
        connectionStatus.className = "status-bar online";
      }
    } catch (err) {
      statusLabel.innerText = "غير متصل بالـ ESP32";
      statusDot.style.background = "#ef4444";
      connectionStatus.className = "status-bar offline";
    }
  }

  setInterval(checkESP, 3000); // افحص كل 3 ثواني

  // كود التعرف على الصوت (نفس السابق)
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.onresult = (e) => {
      const text = e.results[e.results.length - 1][0].transcript.trim().toLowerCase();
      document.getElementById("recognizedText").innerText = "قلت: " + text;
      if (text.includes("on")) sendCommand("on");
      if (text.includes("off")) sendCommand("off");
    };
  }

  function startListening() { recognition.start(); debugLog.innerText = "الميكروفون يعمل..."; }

  async function sendCommand(cmd) {
    try {
      await fetch(`http://${espIpInput.value}/${cmd}`);
      debugLog.innerText = "تم إرسال أمر: " + cmd;
    } catch (e) {
      debugLog.innerText = "فشل إرسال الأمر";
    }
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Khatak - Always Listening</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding: 20px; }
    .card { max-width: 450px; margin: auto; background: #1e293b; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
    
    .status-indicator { 
      padding: 15px; border-radius: 15px; font-weight: bold; margin-bottom: 20px;
      transition: all 0.5s ease;
    }
    .online { background: #064e3b; color: #34d399; }
    .listening { background: #78350f; color: #fbbf24; border: 2px solid #fbbf24; animation: pulse 1.5s infinite; }
    .offline { background: #7f1d1d; color: #f87171; }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    button { 
      padding: 20px; width: 100%; border: none; border-radius: 15px; 
      font-size: 20px; font-weight: bold; cursor: pointer;
      background: #2563eb; color: white; margin-top: 20px;
    }
    
    .voice-text { background: #334155; padding: 20px; border-radius: 15px; margin-top: 20px; min-height: 60px; font-size: 18px; color: #e2e8f0; }
    input { background: #334155; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; width: 80%; text-align: center; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="card">
  <div id="connectionStatus" class="status-indicator offline">جاري الفحص...</div>

  <h2>الروبوت الذكي (استماع دائم)</h2>
  <input type="text" id="espIp" value="robot.local">
  
  <button id="mainBtn" onclick="toggleListening()">تشغيل وضع المساعد الذكي</button>
  
  <div class="voice-text" id="recognizedText">اضغط الزر وابدأ بالكلام...</div>
  <div id="debugLog" style="font-size: 11px; margin-top: 10px; color: #94a3b8;">الحالة: جاهز</div>
</div>

<script>
  const espIpInput = document.getElementById("espIp");
  const statusIndicator = document.getElementById("connectionStatus");
  const recognizedText = document.getElementById("recognizedText");
  const debugLog = document.getElementById("debugLog");
  const mainBtn = document.getElementById("mainBtn");

  let isAlwaysOn = false;
  let recognition = null;

  // 1. فحص الاتصال بالـ ESP32
  async function checkESP() {
    if (isAlwaysOn) return; 
    try {
      const resp = await fetch(`http://${espIpInput.value}/status`, { signal: AbortSignal.timeout(2000) });
      if (resp.ok) {
        statusIndicator.innerText = "متصل بالروبوت ✅";
        statusIndicator.className = "status-indicator online";
      }
    } catch (e) {
      statusIndicator.innerText = "غير متصل ❌";
      statusIndicator.className = "status-indicator offline";
    }
  }
  setInterval(checkESP, 5000);

  // 2. إعداد محرك الصوت
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = "ar-IQ"; 
    recognition.continuous = true; // يبقى مفتوحاً
    recognition.interimResults = false;

    recognition.onstart = () => {
      isAlwaysOn = true;
      statusIndicator.innerText = "أنا أسمعك الآن (دائماً) 🎤";
      statusIndicator.className = "status-indicator listening";
      mainBtn.innerText = "إيقاف المساعد الذكي";
      mainBtn.style.background = "#dc2626";
    };

    recognition.onresult = (event) => {
      const lastResultIndex = event.results.length - 1;
      const text = event.results[lastResultIndex][0].transcript.trim().toLowerCase();
      recognizedText.innerText = "سمعتك تقول: " + text;
      
      // معالجة الأوامر
      if (text.includes("شغل") || text.includes("on")) sendCommand("on");
      if (text.includes("طفي") || text.includes("off")) sendCommand("off");
    };

    recognition.onend = () => {
      // هذه هي الحركة السحرية: إذا انطفأ المايك تلقائياً، نعيد تشغيله
      if (isAlwaysOn) {
        debugLog.innerText = "إعادة تشغيل الاستماع تلقائياً...";
        recognition.start();
      }
    };

    recognition.onerror = (e) => {
      debugLog.innerText = "خطأ: " + e.error;
      // في حالة خطأ "no-speech" المتصفح يغلق المايك، الـ onend ستتكفل بإعادته
    };
  }

  function toggleListening() {
    if (!isAlwaysOn) {
      recognition.start();
    } else {
      isAlwaysOn = false;
      recognition.stop();
      mainBtn.innerText = "تشغيل وضع المساعد الذكي";
      mainBtn.style.background = "#2563eb";
      statusIndicator.innerText = "تم إيقاف الاستماع";
      statusIndicator.className = "status-indicator online";
    }
  }

  async function sendCommand(cmd) {
    try {
      await fetch(`http://${espIpInput.value}/${cmd}`);
      debugLog.innerText = "تم تنفيذ أمر: " + cmd;
    } catch (err) {
      debugLog.innerText = "فشل إرسال الأمر للـ ESP";
    }
  }
</script>
</body>
</html>
